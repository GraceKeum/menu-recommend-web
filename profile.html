<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 설정</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>프로필 설정</h2>

    <label>이름</label>
    <input id="name" placeholder="이름을 입력하세요">

    <div class="card basic-info-card">
      <div class="input-group">
        <label for="age">나이</label>
        <input id="age" type="number" min="1" max="120" placeholder="나이를 입력하세요">
      </div>

      <div class="input-group">
        <label for="gender">성별</label>
        <select id="gender">
          <option value="">성별을 선택하세요</option>
          <option value="남성">남성</option>
          <option value="여성">여성</option>
          <option value="기타">기타</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h3>못 먹는 음식</h3>
      <div id="cannotEat" class="option-group"></div>
    </div>

    <div class="card">
      <h3>안 먹는 음식</h3>
      <div id="dislike" class="option-group"></div>
    </div>

    <div class="card">
      <h3>선호 음식 종류</h3>
      <p>최대 3개 선택</p>
      <div id="preference" class="option-group"></div>
    </div>

    <div class="card">
      <h3>매운맛 선호도</h3>
      <input id="spicy" type="range" min="1" max="5" value="3">
      <p>1단계: 거의 못 먹음 / 5단계: 아주 매운맛 가능</p>
    </div>

    <button onclick="saveProfile()">저장하기</button>
  </div>

  <script type="module" src="script.js"></script>

  <script>
    window.onload = () => {
      if (typeof window.populateProfileForm === 'function') {
        window.populateProfileForm();
      }
    };

    const genderSelect = document.getElementById('gender');
    if (genderSelect) {
      genderSelect.addEventListener('change', function() {
        if (this.value !== "") {
          this.style.color = "#333";
        } else {
          this.style.color = "#aaa";
        }
      });
    }
  </script>
</body>
</html>
